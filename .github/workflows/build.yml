name: Build Pixel kernel

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: jlumbroso/free-disk-space@main

      - name: Checkout
        uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v16
        with:
          name: nickcomua
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build kernel artifacts
        run: nix run --accept-flake-config .#kernel-build -- work/caimito

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: pixel9proxl-kernelsu-next-docker-images
          path: |
            artifacts/boot.img
            artifacts/vendor_kernel_boot.img
            artifacts/dtbo.img
            artifacts/vendor_dlkm.img
            artifacts/system_dlkm.img
            artifacts/Image
            artifacts/.config
            artifacts/validation-report.txt
          if-no-files-found: error
          retention-days: 14
